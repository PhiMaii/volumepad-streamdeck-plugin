name: Package Stream Deck Plugin

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Compute Stream Deck version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="${TAG}.${GITHUB_RUN_NUMBER}"
          echo "tag_version=$TAG" >> "$GITHUB_OUTPUT"
          echo "streamdeck_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using Stream Deck version: $VERSION"

      - name: Package plugin
        run: |
          npx streamdeck pack "net.phimai.volumepad.streamdeck-remote.sdPlugin" ^
            --output "dist" ^
            --version "${{ steps.version.outputs.streamdeck_version }}" ^
            --force ^
            --no-update-check
        shell: cmd

      - name: Upload packaged plugin
        uses: actions/upload-artifact@v4
        with:
          name: streamdeck-plugin-${{ github.ref_name }}
          path: dist/*
